<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
  "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>PSMJ Enquiry</title>
    <link href="https://fonts.googleapis.com/css?family=Roboto" rel="stylesheet" type="text/css" />
</head>
<body style="margin:0; padding:20px; background:#f5f5f5;">

    <div style="max-width:550px; margin:0 auto; background:#ffffff;">

        <div
            style="
                height:40px;
                line-height:40px;
                background:linear-gradient(270deg, #1D1D1D 0%, #393838 100%);
                box-sizing:border-box;
                padding:0 10px;
                color:#fff;
                font-family:'Roboto', sans-serif;
                font-size:17px;
            ">
            PSMJ – New Enquiry
        </div>

        <div
            style="
                font-family:'Roboto', sans-serif;
                font-size:13px;
                color:#202020;
                line-height:1.5;
                padding:20px;
                border-bottom:1px solid #ddd;
                background:#FAFAFA;
            ">

            <p style="margin-top:0;">
                Hi,
            </p>

            <p>
                You have received a new enquiry from the
                <strong>PSMJ</strong> page.
            </p>

            <table
                border="1"
                cellpadding="0"
                cellspacing="0"
                style="
                    width:100%;
                    border-collapse:collapse;
                    border:1px solid #ddd;
                ">

                <tr>
                    <th
                        width="150"
                        style="
                            background:#f0f0f0;
                            text-align:left;
                            padding:8px;
                        ">
                        Name
                    </th>
                    <td style="padding:8px;">
                        {{name}}
                    </td>
                </tr>

                 <tr>
                    <th
                        style="
                            background:#f0f0f0;
                            text-align:left;
                            padding:8px;
                        ">
                        Email ID
                    </th>
                    <td style="padding:8px;">
                        {{email}}
                    </td>
                </tr>

                <tr>
                    <th
                        style="
                            background:#f0f0f0;
                            text-align:left;
                            padding:8px;
                        ">
                        Phone Number
                    </th>
                    <td style="padding:8px;">
                        {{phone}}
                    </td>
                </tr>

                <tr>
                    <th
                        style="
                            background:#f0f0f0;
                            text-align:left;
                            padding:8px;
                        ">
                        WhatsApp Number
                    </th>
                    <td style="padding:8px;">
                        {{whatsapp}}
                    </td>
                </tr>


                 <tr>
                    <th
                        style="
                            background:#f0f0f0;
                            text-align:left;
                            padding:8px;
                        ">
                        Service
                    </th>
                    <td style="padding:8px;">
                        {{service}}
                    </td>
                </tr>

               

                <tr>
                    <th
                        style="
                            background:#f0f0f0;
                            text-align:left;
                            padding:8px;
                        ">
                        Message
                    </th>
                    <td style="padding:8px;">
                        {{message}}
                    </td>
                </tr>

            </table>

            <br />

            <p style="margin-bottom:0;">
                Best Regards,<br />
                PSMJ
            </p>

        </div>

    </div>

</body>
</html>
