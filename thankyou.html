<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
  "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Thank You</title>

    <link href="https://fonts.googleapis.com/css?family=Roboto" rel="stylesheet" type="text/css" />
</head>

<body style="margin:0; padding:0; font-family:Arial, sans-serif; background:#f7f2fa;">

    <div style="padding-left:22px; padding-top:18px;">

        <p style="color:#444; font-size:15px; line-height:1.5; margin:0;">
            Hi
            <span style="text-transform:capitalize;">
                {{name}}
            </span>,
        </p>

        <br />

        <p style="color:#444; font-size:14px; line-height:1.5; margin:0;">
            Thank you for reaching out!<br />
            Our team will contact you soon.
        </p>

        <p style="
            padding:10px;
            padding-left:0;
            font-size:12px;
            color:#464444;
            line-height:17px;
        ">
            Warm regards,<br />
            <strong>PSMJ</strong>
        </p>

    </div>

</body>

</html>
